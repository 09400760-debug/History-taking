<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Case</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    button {
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    #status {
      margin: 12px 0;
      font-weight: bold;
    }
    #transcript {
      border: 1px solid #ccc;
      padding: 16px;
      min-height: 300px;
      white-space: pre-wrap;
      background: #fafafa;
      overflow-y: auto;
    }
    .small {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Realtime Voice History-Taking</h1>
  <p class="small">This page runs the live caregiver interview.</p>

  <div id="status">Not connected</div>

  <div style="margin-top:20px;">
    <button id="startBtn">Start Voice Session</button>
    <button id="stopBtn" disabled>Stop Session</button>
  </div>

  <h3>Live transcript</h3>
  <div id="transcript"></div>

  <audio id="remoteAudio" autoplay></audio>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;

    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const remoteAudioEl = document.getElementById("remoteAudio");

    function addTranscriptLine(speaker, text) {
      transcriptEl.textContent += `${speaker}: ${text}\n`;
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function getQueryParam(name, fallback = "") {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || fallback;
    }

    async function startSession() {
      const age_group = getQueryParam("age_group", "Infant");
      const system = getQueryParam("system", "Respiratory");
      const case_summary = getQueryParam("case_summary", "");
      const opening_line = getQueryParam("opening_line", "Hello, who am I speaking to?");

      statusEl.textContent = "Requesting session...";

      const sessionResp = await fetch("/session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          age_group,
          system,
          case_summary,
          opening_line
        })
      });

      const sessionData = await sessionResp.json();
      const ephemeralKey = sessionData.client_secret;

      pc = new RTCPeerConnection();

      pc.ontrack = (event) => {
        remoteAudioEl.srcObject = event.streams[0];
      };

      dc = pc.createDataChannel("oai-events");

      dc.onopen = () => {
        statusEl.textContent = "Connected";
        addTranscriptLine("Bot", sessionData.opening_line);

        dc.send(JSON.stringify({
          type: "response.create",
          response: {
            instructions: `Say exactly this opening line and nothing else: ${sessionData.opening_line}`
          }
        }));
      };

      dc.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          if (msg.type === "conversation.item.input_audio_transcription.completed") {
            addTranscriptLine("Student", msg.transcript);
          }

          if (msg.type === "response.output_item.done") {
            const item = msg.item;
            if (item && item.content) {
              const transcriptPart = item.content.find(c => c.transcript);
              if (transcriptPart && transcriptPart.transcript) {
                addTranscriptLine("Bot", transcriptPart.transcript);
              }
            }
          }
        } catch (e) {
          console.error("Could not parse event", e, event.data);
        }
      };

      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const baseUrl = "https://api.openai.com/v1/realtime";
      const model = "gpt-realtime-mini";

      const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
        method: "POST",
        body: offer.sdp,
        headers: {
          Authorization: `Bearer ${ephemeralKey}`,
          "Content-Type": "application/sdp"
        },
      });

      const answer = {
        type: "answer",
        sdp: await sdpResponse.text(),
      };

      await pc.setRemoteDescription(answer);

      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").disabled = false;
      statusEl.textContent = "Live session running";
    }

    async function stopSession() {
      if (dc) dc.close();
      if (pc) pc.close();
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      statusEl.textContent = "Disconnected";
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
    }

    document.getElementById("startBtn").addEventListener("click", startSession);
    document.getElementById("stopBtn").addEventListener("click", stopSession);
  </script>
</body>
</html>
