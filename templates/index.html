<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Case</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }
    button, a.button-link {
      display: inline-block;
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 16px;
      text-decoration: none;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: black;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin: 12px 0;
      font-weight: bold;
    }
    #transcript {
      border: 1px solid #ccc;
      padding: 16px;
      min-height: 320px;
      white-space: pre-wrap;
      background: #fafafa;
      overflow-y: auto;
    }
    .small {
      color: #666;
      font-size: 14px;
    }
    #returnSection {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #d9d9d9;
      background: #f9f9f9;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Realtime Voice History-Taking</h1>
  <p class="small">This page runs the live caregiver interview.</p>

  <div id="status">Not connected</div>

  <div style="margin-top:20px;">
    <button id="startBtn">Start Voice Session</button>
    <button id="stopBtn" disabled>Stop Session</button>
  </div>

  <div id="returnSection">
    <p><strong>Session complete.</strong> Return to the main app to continue.</p>
    <a id="returnBtn" class="button-link" href="#">Return to main app</a>
  </div>

  <h3>Live transcript</h3>
  <div id="transcript"></div>

  <audio id="remoteAudio" autoplay></audio>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;
    let sessionFinished = false;
    let openingLineSeen = false;
    let transcriptLines = [];
    let transcriptSaved = false;

    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const remoteAudioEl = document.getElementById("remoteAudio");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const returnSection = document.getElementById("returnSection");
    const returnBtn = document.getElementById("returnBtn");

    function getQueryParam(name, fallback = "") {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || fallback;
    }

    function buildReturnUrl() {
      const rawReturnUrl = getQueryParam("return_url", "");
      if (!rawReturnUrl) return "";

      try {
        const url = new URL(rawReturnUrl);
        url.searchParams.set("import_voice", "1");
        return url.toString();
      } catch {
        return rawReturnUrl.includes("?")
          ? `${rawReturnUrl}&import_voice=1`
          : `${rawReturnUrl}?import_voice=1`;
      }
    }

    const RETURN_URL = buildReturnUrl();

    if (RETURN_URL) {
      returnBtn.href = RETURN_URL;
    } else {
      returnBtn.style.display = "none";
    }

    function addTranscriptLine(speaker, text) {
      if (!text) return;
      transcriptLines.push({ speaker, text });
      transcriptEl.textContent += `${speaker}: ${text}\n`;
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    async function saveTranscriptToServer() {
      if (transcriptSaved) return true;

      try {
        const payload = {
          transcript_lines: transcriptLines,
          transcript_text: transcriptLines.map(x => `${x.speaker}: ${x.text}`).join("\n")
        };

        const response = await fetch("/save_transcript", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Save failed with status ${response.status}`);
        }

        transcriptSaved = true;
        return true;
      } catch (err) {
        console.error("Could not save transcript:", err);
        statusEl.textContent = "Could not save transcript";
        return false;
      }
    }

    function normalizeText(text) {
      return (text || "")
        .toLowerCase()
        .trim()
        .replace(/[.,!?']/g, "")
        .replace(/\s+/g, " ");
    }

    function showReturnSection() {
      returnSection.style.display = "block";
    }

    async function finishSessionAndPrepareReturn() {
      sessionFinished = true;
      statusEl.textContent = "Session complete";
      await saveTranscriptToServer();
      showReturnSection();
    }

    function isFinalLine(botText) {
      const lower = normalizeText(botText);

      return (
        lower === normalizeText("Thank you. Please go back to the Streamlit app and click 'Import latest voice transcript'.") ||
        lower.includes("go back to the streamlit app") ||
        lower.includes("import latest voice transcript")
      );
    }

    async function startSession() {
      try {
        sessionFinished = false;
        openingLineSeen = false;
        transcriptLines = [];
        transcriptSaved = false;
        transcriptEl.textContent = "";
        returnSection.style.display = "none";
        statusEl.textContent = "Accessing microphone...";

        const age_group = getQueryParam("age_group", "Infant");
        const system = getQueryParam("system", "Respiratory");
        const caregiver_name = getQueryParam("caregiver_name", "Lindiwe");
        const child_name = getQueryParam("child_name", "");
        const presenting_complaint = getQueryParam("presenting_complaint", "");
        const case_summary = getQueryParam("case_summary", "");
        const opening_line = getQueryParam("opening_line", "Hello, who am I speaking to?");
        const normalizedOpeningLine = normalizeText(opening_line);

        pc = new RTCPeerConnection();

        pc.ontrack = (event) => {
          remoteAudioEl.srcObject = event.streams[0];
        };

        pc.onconnectionstatechange = () => {
          if (!sessionFinished && pc) {
            statusEl.textContent = `Connection state: ${pc.connectionState}`;
          }
        };

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          if (!sessionFinished) {
            statusEl.textContent = "Connected";
          }
        };

        dc.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            console.log("Realtime event:", msg);

            if (msg.type === "conversation.item.input_audio_transcription.completed") {
              if (!sessionFinished && msg.transcript) {
                addTranscriptLine("Student", msg.transcript);
              }
              return;
            }

            if (msg.type === "response.output_item.done") {
              const item = msg.item;
              if (item && item.content) {
                const transcriptPart = item.content.find(c => c.transcript);
                if (transcriptPart && transcriptPart.transcript) {
                  const botText = transcriptPart.transcript;
                  const normalizedBotText = normalizeText(botText);

                  if (sessionFinished) return;

                  if (normalizedBotText === normalizedOpeningLine) {
                    if (!openingLineSeen) {
                      openingLineSeen = true;
                      addTranscriptLine("Bot", botText);
                    }
                    return;
                  }

                  addTranscriptLine("Bot", botText);

                  const lower = normalizeText(botText);

                  if (lower === normalizeText("Would you like to move to preceptor mode?")) {
                    statusEl.textContent = "Preceptor handoff offered";
                    return;
                  }

                  if (
                    lower.includes("based on the history what is your assessment") &&
                    lower.includes("what are your differential diagnoses")
                  ) {
                    statusEl.textContent = "Preceptor mode";
                    return;
                  }

                  if (isFinalLine(botText)) {
                    await finishSessionAndPrepareReturn();
                    return;
                  }
                }
              }
              return;
            }

            if (msg.type === "error") {
              console.error("Realtime error:", msg);
              if (!sessionFinished) {
                statusEl.textContent = "Realtime error - check console";
              }
            }
          } catch (e) {
            console.error("Event parse error", e, event.data);
          }
        };

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        statusEl.textContent = "Creating WebRTC offer...";
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        statusEl.textContent = "Connecting to server...";
        const query = new URLSearchParams({
          age_group,
          system,
          caregiver_name,
          child_name,
          presenting_complaint,
          case_summary,
          opening_line
        }).toString();

        const sdpResponse = await fetch(`/session?${query}`, {
          method: "POST",
          body: offer.sdp,
          headers: {
            "Content-Type": "application/sdp"
          }
        });

        if (!sdpResponse.ok) {
          const errText = await sdpResponse.text();
          throw new Error(`SDP exchange failed: ${sdpResponse.status} ${errText}`);
        }

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text()
        };

        await pc.setRemoteDescription(answer);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusEl.textContent = "Live session running";

      } catch (err) {
        console.error(err);
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    async function stopSession() {
      await saveTranscriptToServer();

      if (dc) {
        try { dc.close(); } catch {}
        dc = null;
      }
      if (pc) {
        try { pc.close(); } catch {}
        pc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => {
          try { track.stop(); } catch {}
        });
        localStream = null;
      }

      startBtn.disabled = false;
      stopBtn.disabled = true;

      if (sessionFinished) {
        statusEl.textContent = "Session complete";
      } else {
        statusEl.textContent = "Disconnected";
      }

      showReturnSection();

      if (RETURN_URL) {
        window.location.href = RETURN_URL;
      }
    }

    startBtn.addEventListener("click", startSession);
    stopBtn.addEventListener("click", stopSession);
  </script>
</body>
</html>
